<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建付け測定入力アプリ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 建付け測定入力アプリ</h1>
            <p>デジタルノギス無線測定システム</p>
        </header>

        <nav class="tabs">
            <button class="tab-button active" data-tab="measurement">
                <span class="icon">📏</span> 測定入力
            </button>
            <button class="tab-button" data-tab="history">
                <span class="icon">📋</span> 測定履歴
            </button>
            <button class="tab-button" data-tab="report">
                <span class="icon">📊</span> 日報出力
            </button>
        </nav>

        <!-- ========== Measurement Tab ========== -->
        <section id="measurement" class="tab-content active">
            <div class="card">
                <h2>📐 測定値入力</h2>
                
                <div class="form-group">
                    <label for="partSelect">部品選択:</label>
                    <select id="partSelect">
                        <option value="">-- 部品を選択してください --</option>
                    </select>
                </div>

                <div class="info-box" id="masterDataInfo" style="display: none;">
                    <h4>マスターデータ情報</h4>
                    <div class="info-row">
                        <span class="info-label">基準値:</span>
                        <span class="info-value"><span id="standardValue">-</span> mm</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">許容範囲:</span>
                        <span class="info-value"><span id="toleranceRange">-</span> mm</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="measuredValue">測定値 (mm):</label>
                    <input type="number" id="measuredValue" placeholder="デジタルノギスから数値を入力" step="0.01" min="0">
                    <small>例: 25.05</small>
                </div>

                <button class="btn btn-primary btn-large" onclick="recordMeasurement()">
                    <span class="btn-icon">✓</span> 測定値を記録
                </button>

                <!-- Result Container -->
                <div id="resultContainer" class="result-container" style="display: none;">
                    <div id="resultBox" class="result-box">
                        <div class="result-icon" id="resultIcon"></div>
                        <h3 id="resultText"></h3>
                        <div id="resultDetails" class="result-details"></div>
                        <div class="result-actions">
                            <button class="btn btn-secondary" onclick="resetForm()">次の測定</button>
                            <button class="btn btn-warning" onclick="showRetakeForm()">再測定</button>
                        </div>
                    </div>
                </div>

                <!-- Retake Form -->
                <div id="retakeContainer" class="retake-container" style="display: none;">
                    <div class="retake-form">
                        <h3>🔄 再測定値入力</h3>
                        <p class="retake-info">NG判定の部品を再度測定してください</p>
                        <div class="form-group">
                            <input type="number" id="retakeMeasuredValue" placeholder="再測定値を入力" step="0.01" min="0">
                        </div>
                        <div class="button-group">
                            <button class="btn btn-primary" onclick="recordRetakeMeasurement()">再測定を記録</button>
                            <button class="btn btn-secondary" onclick="cancelRetake()">キャンセル</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ========== History Tab ========== -->
        <section id="history" class="tab-content">
            <div class="card">
                <h2>📋 測定履歴</h2>
                
                <div class="filter-section">
                    <div class="form-group inline">
                        <label for="historyDate">日付:</label>
                        <input type="date" id="historyDate">
                    </div>
                    <button class="btn btn-primary" onclick="loadHistory()">検索</button>
                </div>

                <!-- Statistics Section -->
                <div id="statisticsContainer" class="statistics-box" style="display: none;">
                    <h3>📊 統計情報</h3>
                    <div class="stats-grid">
                        <div class="stat-item total">
                            <div class="stat-icon">📈</div>
                            <div class="stat-content">
                                <label>合計測定数</label>
                                <p id="statTotal">0</p>
                            </div>
                        </div>
                        <div class="stat-item ok">
                            <div class="stat-icon">✓</div>
                            <div class="stat-content">
                                <label>OK件数</label>
                                <p id="statOK">0</p>
                            </div>
                        </div>
                        <div class="stat-item ng">
                            <div class="stat-icon">✗</div>
                            <div class="stat-content">
                                <label>NG件数</label>
                                <p id="statNG">0</p>
                            </div>
                        </div>
                        <div class="stat-item retake">
                            <div class="stat-icon">🔄</div>
                            <div class="stat-content">
                                <label>再測定件数</label>
                                <p id="statRetake">0</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- History Table -->
                <div class="table-wrapper" id="tableWrapper" style="display: none;">
                    <table id="historyTable" class="history-table">
                        <thead>
                            <tr>
                                <th>部品名</th>
                                <th>測定値 (mm)</th>
                                <th>基準値 (mm)</th>
                                <th>許容範囲 (mm)</th>
                                <th>判定</th>
                                <th>再測定</th>
                                <th>測定時刻</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                        </tbody>
                    </table>
                </div>

                <div id="noDataMessage" class="no-data-message" style="display: none;">
                    <p>📭 選択した日付のデータがありません</p>
                </div>
            </div>
        </section>

        <!-- ========== Report Tab ========== -->
        <section id="report" class="tab-content">
            <div class="card">
                <h2>📊 日報出力</h2>
                
                <div class="filter-section">
                    <div class="form-group inline">
                        <label for="reportDate">報告日:</label>
                        <input type="date" id="reportDate">
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn btn-primary btn-large" onclick="downloadReport()">
                        <span class="btn-icon">⬇</span> PDF をダウンロード
                    </button>
                    <button class="btn btn-secondary" onclick="previewReport()">
                        <span class="btn-icon">👁</span> プレビュー
                    </button>
                </div>

                <!-- Report Preview -->
                <div id="reportPreview" class="report-preview" style="display: none;">
                    <h3>📄 レポートプレビュー</h3>
                    <div id="previewContent" class="preview-box"></div>
                </div>

                <!-- Message -->
                <div id="reportMessage" class="message-box" style="display: none;"></div>
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2024 建付け測定入力アプリ | Version 1.0.0</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
